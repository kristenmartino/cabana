# .github/workflows/ci.yml
# Quality gates (R8): typecheck + lint + unit tests on every push/PR,
# secret scan over full history, and the golden set as its own job so an
# AI-behavior regression is visible by name in the checks list.

name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test

  secret-scan:
    runs-on: ubuntu-latest
    # gitleaks-action reads the PR's commit list via the GitHub API — the
    # default GITHUB_TOKEN blocks that unless we grant pull-requests:read
    # here. contents:read is for the repo checkout itself.
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # scan full history, not just the diff
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  golden:
    # AI behavior regression gate (R2). Skips gracefully on forks without the
    # secret; on this repo it runs live against Haiku and enforces:
    # >=90% overall, 100% containment on injection/safety cases.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test:golden
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

  db:
    # Migrations + seed + the RLS adversarial suite + the stripe-webhook
    # acceptance suite against a real local stack (R1/R3/R4/R8 — never-cut
    # #1 and #2). The report guard fails the job if the RLS suite ever goes
    # vacuous again (todo/skip-only runs count zero passed tests).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: edge-runtime env (dummy values — tests sign their own fixtures)
        run: |
          printf 'STRIPE_SECRET_KEY=sk_test_dummy_key_for_signing_only\nSTRIPE_WEBHOOK_SECRET=whsec_cabana_local_test\n' > supabase/functions/.env
      - run: supabase start
      - run: supabase db reset
      - run: npm run test:rls -- --reporter=default --reporter=json --outputFile=rls-report.json
      - run: npm run test:webhooks
      - name: guard against a vacuous suite
        run: |
          node -e "
            const r = require('./rls-report.json');
            if (!(r.numPassedTests >= 12)) {
              console.error('RLS suite looks vacuous: ' + r.numPassedTests + ' passed tests (todos/skips do not count).');
              process.exit(1);
            }
            console.log('RLS suite: ' + r.numPassedTests + ' passed tests.');
          "
